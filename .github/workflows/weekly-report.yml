name: 周报自动生成

on:
  schedule:
    # 每周日 UTC 10:00 = 北京时间 18:00
    - cron: '0 10 * * 0'
  workflow_dispatch:
    inputs:
      week:
        description: '指定周次（如 2026-W09），留空则自动计算'
        required: false
        type: string

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scrapers/requirements.txt'

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Run scraper pipeline
        working-directory: scrapers
        run: |
          if [ -n "${{ github.event.inputs.week }}" ]; then
            python3 main.py --week "${{ github.event.inputs.week }}"
          else
            python3 main.py
          fi

      - name: Commit generated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hugo-site/content/weekly/ scrapers/data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            WEEK_ID=$(date +%G-W%V)
            git commit -m "auto: 生成 ${WEEK_ID} 周报"
            git push
          fi
